# Aesthetic_Deer theme for tmux - auto-generated from wallpaper

set -g message-style 'fg=#fa868e bg=default'

set -g pane-border-style "fg=#0c2432"
set -g pane-active-border-style "fg=#00c0ee"

set -g window-status-format "#[fg=#4e6777,bg=default]#W"
set -g window-status-current-format "#[fg=#dd77ac]⇢ #W"

set -g status-style 'fg=#dcdee5 bg=default'
set -g status-right-style 'fg=#fa868e bg=default bold'
