# Color-Wall theme for tmux - auto-generated from wallpaper

set -g message-style 'fg=#adb742 bg=default'

set -g pane-border-style "fg=#082530"
set -g pane-active-border-style "fg=#00c4e1"

set -g window-status-format "#[fg=#4b6875,bg=default]#W"
set -g window-status-current-format "#[fg=#d57abd]⇢ #W"

set -g status-style 'fg=#d8dfe4 bg=default'
set -g status-right-style 'fg=#adb742 bg=default bold'
