# Golden-Hours theme for tmux - auto-generated from wallpaper

set -g message-style 'fg=#c1b033 bg=default'

set -g pane-border-style "fg=#04262d"
set -g pane-active-border-style "fg=#00c8cf"

set -g window-status-format "#[fg=#486a71,bg=default]#W"
set -g window-status-current-format "#[fg=#d28f20]⇢ #W"

set -g status-style 'fg=#d7e0e0 bg=default'
set -g status-right-style 'fg=#c1b033 bg=default bold'
