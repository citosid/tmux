# Mountain theme for tmux - auto-generated from wallpaper

set -g message-style 'fg=#f78e62 bg=default'

set -g pane-border-style "fg=#172135"
set -g pane-active-border-style "fg=#61b4ff"

set -g window-status-format "#[fg=#57637b,bg=default]#W"
set -g window-status-current-format "#[fg=#e87782]⇢ #W"

set -g status-style 'fg=#e4dbdd bg=default'
set -g status-right-style 'fg=#f78e62 bg=default bold'
