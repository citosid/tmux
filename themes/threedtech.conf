# Threedtech theme for tmux - auto-generated from wallpaper

set -g message-style 'fg=#e29f36 bg=default'

set -g pane-border-style "fg=#042825"
set -g pane-active-border-style "fg=#1fcaa4"

set -g window-status-format "#[fg=#496b67,bg=default]#W"
set -g window-status-current-format "#[fg=#e4804d]⇢ #W"

set -g status-style 'fg=#dedfd7 bg=default'
set -g status-right-style 'fg=#e29f36 bg=default bold'
